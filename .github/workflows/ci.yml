name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pinned Rust toolchain. Bump this deliberately (and fix any new clippy/rustfmt
  # findings in the same PR) rather than tracking @stable, so a new compiler
  # release can't turn CI red without a code change. Keep >= the gui feature's
  # MSRV (egui 0.33 needs 1.88).
  RUST_VERSION: "1.96.0"

jobs:
  core:
    name: Core (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --no-default-features --all-targets -- -D warnings

      - name: Test (default features)
        run: cargo test

      - name: Test (no default features)
        run: cargo test --no-default-features

      - name: Doc
        run: cargo doc --no-deps

  windows:
    name: Windows (gui + wgc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Build (gui + wgc + record)
        run: cargo build --features "gui wgc record"

      - name: Clippy (gui + wgc + record)
        run: cargo clippy --features "gui wgc record" --all-targets -- -D warnings

      - name: Test (gui + wgc + record)
        run: cargo test --features "gui wgc record"

  whisper:
    name: Whisper engine (Linux build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2

      # Bundled whisper.cpp builds cleanly on Linux (it only misbehaves on the
      # Windows toolchains today — see CHANGELOG). This verifies the `whisper`
      # transcription arm compiles. ubuntu-latest ships cmake + clang/libclang.
      - name: Build (whisper)
        run: cargo build --features whisper
